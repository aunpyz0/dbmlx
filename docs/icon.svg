<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d48"/>
      <stop offset="100%" stop-color="#232338"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6ffd"/>
      <stop offset="100%" stop-color="#5b8af7"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6ffd"/>
      <stop offset="100%" stop-color="#5b8af7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.7" fill="#ffffff" opacity="0.06"/>
  </pattern>
  <rect width="128" height="128" rx="22" fill="url(#dots)"/>

  <!-- Alignment guides -->
  <line x1="64" y1="8"  x2="64" y2="16" stroke="#7c6ffd" stroke-width="0.75" opacity="0.35"/>
  <line x1="8"  y1="55" x2="16" y2="55" stroke="#7c6ffd" stroke-width="0.75" opacity="0.35"/>
  <line x1="112" y1="55" x2="120" y2="55" stroke="#7c6ffd" stroke-width="0.75" opacity="0.35"/>

  <!-- Table card -->
  <rect x="14" y="17" width="100" height="76" rx="7" fill="url(#card)" stroke="#3e3e60" stroke-width="1" filter="url(#shadow)"/>

  <!-- Header -->
  <rect x="14" y="17" width="100" height="18" rx="7" fill="url(#hdr)"/>
  <rect x="14" y="27"  width="100" height="8"  rx="0" fill="url(#hdr)"/>
  <rect x="22" y="22" width="28"  height="4"  rx="2" fill="white" opacity="0.92"/>

  <!-- Row 1 -->
  <line x1="14" y1="47" x2="114" y2="47" stroke="#3e3e60" stroke-width="0.75"/>
  <rect x="22" y="51" width="14" height="3" rx="1.5" fill="#7c6ffd" opacity="0.9"/>
  <rect x="44" y="51" width="32" height="3" rx="1.5" fill="#5a5a7a"/>

  <!-- Row 2 -->
  <line x1="14" y1="60" x2="114" y2="60" stroke="#3e3e60" stroke-width="0.75"/>
  <rect x="22" y="64" width="20" height="3" rx="1.5" fill="#5a5a7a"/>
  <rect x="44" y="64" width="24" height="3" rx="1.5" fill="#5a5a7a"/>

  <!-- Row 3 -->
  <line x1="14" y1="73" x2="114" y2="73" stroke="#3e3e60" stroke-width="0.75"/>
  <rect x="22" y="77" width="18" height="3" rx="1.5" fill="#4caf80" opacity="0.9"/>
  <rect x="44" y="77" width="20" height="3" rx="1.5" fill="#5a5a7a"/>

  <!-- Row 4 -->
  <line x1="14" y1="86" x2="114" y2="86" stroke="#3e3e60" stroke-width="0.75"/>
  <rect x="22" y="88" width="12" height="3" rx="1.5" fill="#e06c75" opacity="0.85"/>
  <rect x="44" y="88" width="28" height="3" rx="1.5" fill="#5a5a7a"/>

  <!-- Selection handles -->
  <rect x="10" y="13" width="7" height="7" rx="1.5" fill="#7c6ffd" stroke="#0f0f1e" stroke-width="1.5"/>
  <rect x="111" y="13" width="7" height="7" rx="1.5" fill="#7c6ffd" stroke="#0f0f1e" stroke-width="1.5"/>
  <rect x="10" y="87" width="7" height="7" rx="1.5" fill="#7c6ffd" stroke="#0f0f1e" stroke-width="1.5"/>
  <rect x="111" y="87" width="7" height="7" rx="1.5" fill="#7c6ffd" stroke="#0f0f1e" stroke-width="1.5"/>
  <!-- Mid handles -->
  <rect x="60" y="13" width="7" height="7" rx="1.5" fill="#7c6ffd" stroke="#0f0f1e" stroke-width="1.5"/>
  <rect x="60" y="87" width="7" height="7" rx="1.5" fill="#7c6ffd" stroke="#0f0f1e" stroke-width="1.5"/>

  <!-- DBMLX pill -->
  <rect x="24" y="101" width="80" height="19" rx="9.5" fill="url(#pill)" filter="url(#shadow)"/>
  <text x="64" y="114.5" font-family="system-ui, -apple-system, ui-sans-serif, sans-serif" font-size="10.5" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1.5">DBMLX</text>
</svg>
